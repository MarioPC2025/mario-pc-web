<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VBVPJ6H5H5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-VBVPJ6H5H5');

    <meta name="robots" content="noindex, follow">
    <title>¡Gracias por tu mensaje! — Mario PC</title>

    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#07090a">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #07090a;
            --green: #1ddd65;
            --green-dim: rgba(29, 221, 101, 0.1);
            --green-border: rgba(29, 221, 101, 0.22);
            --white: #e8edea;
            --muted: #536057;
            --font-display: 'Bebas Neue', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--font-body);
            font-weight: 300;
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(29, 221, 101, 0.09) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .grain {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/></filter><rect width='300' height='300' filter='url(%23n)' opacity='1'/></svg>");
            opacity: 0.032;
            pointer-events: none;
            z-index: 9999;
        }

        .thanks-wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .thanks-icon {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            border: 1px solid var(--green-border);
            background: var(--green-dim);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--green);
            font-size: 2.4rem;
            margin-bottom: 2rem;
        }

        .thanks-eyebrow {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.25rem;
        }

        .thanks-eyebrow-line {
            width: 36px;
            height: 1px;
            background: var(--green);
        }

        .thanks-eyebrow-text {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--green);
        }

        .thanks-title {
            font-family: var(--font-display);
            font-size: clamp(2.8rem, 7vw, 5rem);
            line-height: 0.95;
            letter-spacing: 0.01em;
            margin-bottom: 1.25rem;
        }

        .thanks-title em {
            font-style: normal;
            color: var(--green);
        }

        .thanks-desc {
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.75;
            max-width: 420px;
            margin-bottom: 2.5rem;
        }

        .thanks-actions {
            display: flex;
            gap: 0.875rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--green);
            color: #030804;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 14px 28px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--green-border);
            color: var(--green);
            background: var(--green-dim);
        }

        .thanks-footer {
            position: absolute;
            bottom: 2rem;
            font-family: var(--font-mono);
            font-size: 0.58rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

<div class="grain"></div>

<div class="thanks-wrap">
    <div class="thanks-icon">
        <i class="ph-fill ph-check"></i>
    </div>

    <div class="thanks-eyebrow">
        <div class="thanks-eyebrow-line"></div>
        <span class="thanks-eyebrow-text">Mensaje enviado</span>
        <div class="thanks-eyebrow-line"></div>
    </div>

    <h1 class="thanks-title">¡Gracias<br><em>por escribir!</em></h1>
    <p class="thanks-desc">
        Recibí tu mensaje y te voy a responder por email dentro de las próximas 24 horas. Si es urgente, escribime directo por WhatsApp.
    </p>

    <div class="thanks-actions">
        <a href="/" class="btn-primary">
            <i class="ph ph-house"></i>
            Volver al inicio
        </a>
        <a href="https://wa.me/5491123999259" target="_blank" class="btn-secondary">
            <i class="ph-fill ph-whatsapp-logo"></i>
            Escribir por WhatsApp
        </a>
    </div>

    <div class="thanks-footer">© 2026 Mario PC — Todos los derechos reservados</div>
</div>

</body>
</html>
