<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, follow">
    <title>Página no encontrada — Mario PC</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #07090a;
            --bg-alt: #0c0f10;
            --green: #1ddd65;
            --green-dim: rgba(29, 221, 101, 0.1);
            --green-border: rgba(29, 221, 101, 0.22);
            --white: #e8edea;
            --muted: #536057;
            --font-display: 'Bebas Neue', sans-serif;
            --font-mono: 'Space Mono', monospace;
            --font-body: 'DM Sans', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: var(--font-body);
            font-weight: 300;
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: radial-gradient(circle, rgba(29, 221, 101, 0.09) 1px, transparent 1px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .grain {
            position: fixed;
            inset: -50%;
            width: 200%;
            height: 200%;
            background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/></filter><rect width='300' height='300' filter='url(%23n)' opacity='1'/></svg>");
            opacity: 0.032;
            pointer-events: none;
            z-index: 9999;
        }

        .error-wrap {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .error-logo {
            width: 56px;
            height: 56px;
            object-fit: contain;
            margin-bottom: 2.5rem;
            opacity: 0.9;
        }

        .error-eyebrow {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .error-eyebrow-line {
            width: 36px;
            height: 1px;
            background: var(--green);
        }

        .error-eyebrow-text {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--green);
        }

        .error-code {
            font-family: var(--font-display);
            font-size: clamp(6rem, 20vw, 12rem);
            line-height: 0.85;
            letter-spacing: 0.02em;
            color: var(--white);
        }

        .error-code em {
            font-style: normal;
            color: var(--green);
        }

        .error-title {
            font-family: var(--font-display);
            font-size: clamp(1.6rem, 3.5vw, 2.4rem);
            letter-spacing: 0.02em;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .error-desc {
            font-size: 0.95rem;
            color: var(--muted);
            line-height: 1.75;
            max-width: 420px;
            margin-bottom: 2.5rem;
        }

        .error-actions {
            display: flex;
            gap: 0.875rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--green);
            color: #030804;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 2px;
            transition: all 0.2s;
        }

        .btn-primary:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        .btn-secondary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--white);
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 14px 28px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2px;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            border-color: var(--green-border);
            color: var(--green);
            background: var(--green-dim);
        }

        .error-footer {
            position: absolute;
            bottom: 2rem;
            font-family: var(--font-mono);
            font-size: 0.58rem;
            color: var(--muted);
            letter-spacing: 0.1em;
        }
    </style>
</head>
<body>

<div class="grain"></div>

<div class="error-wrap">
    <img src="logo.png" alt="Mario PC" class="error-logo">

    <div class="error-eyebrow">
        <div class="error-eyebrow-line"></div>
        <span class="error-eyebrow-text">Error 404</span>
        <div class="error-eyebrow-line"></div>
    </div>

    <div class="error-code">4<em>0</em>4</div>
    <h1 class="error-title">Esta página no existe</h1>
    <p class="error-desc">
        Parece que el link está roto o la página fue movida. Volvé al inicio o escribime directamente por WhatsApp si necesitás ayuda.
    </p>

    <div class="error-actions">
        <a href="/" class="btn-primary">
            <i class="ph ph-house"></i>
            Volver al inicio
        </a>
        <a href="https://wa.me/5491123999259" target="_blank" class="btn-secondary">
            <i class="ph-fill ph-whatsapp-logo"></i>
            Escribir por WhatsApp
        </a>
    </div>

    <div class="error-footer">© 2026 Mario PC — Todos los derechos reservados</div>
</div>

</body>
</html>
